    <style>
        @keyframes floatUp {
            0% {
                transform: translateY(100%) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-120%) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes crescentGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes lanternSwing {

            0%,
            100% {
                transform: rotate(-3deg);
            }

            50% {
                transform: rotate(3deg);
            }
        }

        .float-particle {
            position: absolute;
            animation: floatUp linear infinite;
            pointer-events: none;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #d4af37, #f5e6a3, #d4af37, #b8941f, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        .card-envelope {
            animation: scaleIn 1s ease-out 0.3s both;
        }

        .greeting-anim {
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .msg-anim {
            animation: fadeInUp 1s ease-out 1.2s both;
        }

        .divider-anim {
            animation: fadeInUp 0.8s ease-out 1.5s both;
        }

        .sender-anim {
            animation: fadeInUp 1s ease-out 1.8s both;
        }

        .nick-anim {
            animation: fadeInUp 0.8s ease-out 2.1s both;
        }

        .star-twinkle {
            animation: twinkle ease-in-out infinite;
        }

        .crescent-glow {
            animation: crescentGlow 3s ease-in-out infinite;
        }

        .lantern {
            animation: lanternSwing 3s ease-in-out infinite;
            transform-origin: top center;
        }

        .ornament-left {
            animation: slideInLeft 1s ease-out 0.5s both;
        }

        .ornament-right {
            animation: slideInRight 1s ease-out 0.5s both;
        }

        .card-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .pattern-bg {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .geometric-border {
            background: repeating-linear-gradient(90deg,
                    #d4af37 0px, #d4af37 8px,
                    transparent 8px, transparent 16px);
            height: 2px;
            opacity: 0.5;
        }

        .inner-card-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 25 L55 30 L35 35 L30 55 L25 35 L5 30 L25 25 Z' fill='none' stroke='%23d4af37' stroke-width='0.3' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
            overflow-x: hidden;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .typing::after {
            content: "|";
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            50%,
            100% {
                opacity: 1;
            }

            25%,
            75% {
                opacity: 0;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes floatTeddy {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        #teddyBox.playing {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px gold);
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            40% {
                transform: scale(1);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes heartGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9));
            }
        }

        .heart-animate {
            animation: heartBeat 1.2s infinite ease-in-out,
                heartGlow 2.5s infinite ease-in-out;
            transform-origin: center;
        }

        .heart-animate:hover {
            transform: scale(1.3);
            transition: 0.3s;
        }
    </style>

    <script>
        // Floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const symbols = ['✦', '✧', '⋆', '☪', '∗', '·'];
            const count = window.innerWidth < 640 ? 10 : 20;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('span');
                p.className = 'float-particle';
                p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.fontSize = (Math.random() * 10 + 6) + 'px';
                p.style.color = '#d4af37';
                p.style.opacity = Math.random() * 0.4 + 0.1;
                p.style.animationDuration = (Math.random() * 12 + 10) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Element SDK
        const defaultConfig = {
            greeting_title: 'Eid Mubarak',
            message_text: 'Assalamualaikum,\n\nOn this blessed occasion of Eid, my heart reaches out to you with warmth and deep affection. Though distance separates us, the bond we share remains unbreakable. You hold a cherished place in my life, and your presence is truly missed.\n\nIn every moment of this Eid celebration, I think of you and wish you were here to share the joy. Your smile, your laughter, your kindness - these are the treasures I miss most.\n\nMay Allah bless you with endless happiness, good health, and success. May this Eid bring you closer to your dreams and fill your life with countless blessings.\n\nUntil we meet again, know that you are always in my heart and in my prayers.',
            sender_name: 'MD ARSHAD ALI',
            nick_name: 'Prince',
            background_color: '#0a1628',
            card_color: '#1a2744',
            text_color: '#c5cfe0',
            accent_color: '#d4af37',
            sender_color: '#f5e6a3',
            font_family: 'Playfair Display',
            font_size: 16
        };

        function typeWriterEffect(element, html, speed = 25) {
            element.classList.add("typing");
            element.innerHTML = "";

            let tempDiv = document.createElement("div");
            tempDiv.innerHTML = html;

            let nodes = Array.from(tempDiv.childNodes);
            let i = 0;

            function typeNode(node) {
                if (node.nodeType === 3) {
                    // Text node
                    let text = node.textContent;
                    let j = 0;

                    function typeChar() {
                        if (j < text.length) {
                            element.innerHTML += text.charAt(j);
                            window.scrollTo(0, document.body.scrollHeight);
                            j++;
                            setTimeout(typeChar, speed);
                        } else {
                            i++;
                            typeNext();
                        }
                    }
                    typeChar();
                } else if (node.nodeType === 1) {
                    // Element node (like <br> or <span>)
                    element.appendChild(node.cloneNode(false));
                    let parent = element.lastChild;

                    let children = Array.from(node.childNodes);
                    let k = 0;

                    function typeChild() {
                        if (k < children.length) {
                            let child = children[k];
                            if (child.nodeType === 3) {
                                let text = child.textContent;
                                let j = 0;

                                function typeChar() {
                                    if (j < text.length) {
                                        parent.innerHTML += text.charAt(j);
                                        j++;
                                        setTimeout(typeChar, speed);
                                    } else {
                                        k++;
                                        typeChild();
                                    }
                                }
                                typeChar();
                            } else {
                                parent.appendChild(child.cloneNode(true));
                                k++;
                                typeChild();
                            }
                        } else {
                            i++;
                            typeNext();
                        }
                    }
                    typeChild();
                }
            }

            function typeNext() {
                if (i < nodes.length) {
                    typeNode(nodes[i]);
                }
                else {
                    element.classList.remove("typing");
                }
            }

            typeNext();
        }

        function applyConfig(config) {
            const c = { ...defaultConfig, ...config };

            const user = getParams();


            // Greeting
            document.getElementById('el-greeting').textContent = c.greeting_title;
            let message = c.message_text.replace(/\n/g, "<br>");

            if (user.to) {
                message = message.replace(
                    /Assalamualaikum,/,
                    `Assalamualaikum <span style="color:#d4af37;">${user.to}</span> ✨,`
                );
            } else {
                message = message.replace(
                    /Assalamualaikum,/,
                    `Assalamualaikum <span style="color:#d4af37;">Dear one</span> ✨,`
                );
            }

            document.getElementById('el-sender').textContent = user.from || c.sender_name;
            document.getElementById('el-nick').textContent = user.nick || c.nick_name;


            const messageElement = document.getElementById("el-message");
            setTimeout(() => {
                typeWriterEffect(messageElement, message, 25);
            }, 800);



            // Colors
            const wrapper = document.getElementById('app-wrapper');
            wrapper.style.background = `linear-gradient(160deg, ${c.background_color} 0%, ${adjustBrightness(c.background_color, 20)} 30%, ${c.background_color} 100%)`;

            const card = document.querySelector('.card-envelope');
            if (card) card.style.background = `linear-gradient(170deg, ${c.card_color}, ${adjustBrightness(c.card_color, -10)})`;

            document.getElementById('el-message').style.color = c.text_color;
            document.getElementById('el-sender').style.color = c.accent_color;
            document.getElementById('el-nick').style.color = c.sender_color;

            // Fonts
            const titleFont = `${c.font_family}, Playfair Display, serif`;
            const bodyFont = `${c.font_family}, Cormorant Garamond, serif`;
            document.getElementById('el-greeting').style.fontFamily = titleFont;
            document.getElementById('el-sender').style.fontFamily = titleFont;
            document.getElementById('el-message').style.fontFamily = bodyFont;

            // Font size
            const base = c.font_size || 16;
            document.getElementById('el-greeting').style.fontSize = `${base * 3.2}px`;
            document.getElementById('el-message').style.fontSize = `${base * 1.1}px`;
            document.getElementById('el-sender').style.fontSize = `${base * 1.75}px`;
            document.getElementById('el-nick').style.fontSize = `${base * 0.9}px`;
        }

        function adjustBrightness(hex, amount) {
            hex = hex.replace('#', '');
            let r = Math.min(255, Math.max(0, parseInt(hex.substring(0, 2), 16) + amount));
            let g = Math.min(255, Math.max(0, parseInt(hex.substring(2, 4), 16) + amount));
            let b = Math.min(255, Math.max(0, parseInt(hex.substring(4, 6), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function makeColorMutable(key) {
            return {
                get: () => (window.elementSdk.config && window.elementSdk.config[key]) || defaultConfig[key],
                set: (v) => { window.elementSdk.setConfig({ [key]: v }); }
            };
        }


        lucide.createIcons();

        function getParams() {
            const params = new URLSearchParams(window.location.search);

            return {
                to: params.get("to") ? atob(params.get("to")) : null,
                from: params.get("from") ? atob(params.get("from")) : null,
                nick: params.get("nick") ? atob(params.get("nick")) : null
            };
        }


        applyConfig(defaultConfig);



        function toggleMusic() {
            const music = document.getElementById("bg-music");

            if (music.paused) {
                music.play().catch(() => { });
            } else {
                music.pause();
            }
        }


        document.getElementById("teddyBox").addEventListener("click", () => {
            const music = document.getElementById("bg-music");
            const label = document.querySelector("#teddyBox div:last-child");
            const teddy = document.getElementById("teddyBox");

            if (music.paused) {
                music.volume = 0.4;
                music.play().catch(() => { });
                label.innerText = "Playing 🎶";
                teddy.classList.add("playing");   // ✅ ADD THIS
            } else {
                music.pause();
                label.innerText = "Paused ⏸️";
                teddy.classList.remove("playing"); // ✅ ADD THIS
            }
        });
    </script>
